[Unit]
After=camera-init.service

[Service]
Environment=GST_PLUGIN_PATH=/usr/lib/gstreamer-1.0
# Relax sandboxing for icamerasrc hardware access
PrivateNetwork=no
InaccessibleDirectories=
ReadOnlyDirectories=
DevicePolicy=auto
# Give v4l2-relayd time to initialize, then restart WirePlumber
# so PipeWire re-probes the device with the correct format
ExecStartPost=/bin/bash -c 'sleep 2 && systemctl --user -M 1000@ restart wireplumber.service 2>/dev/null || true'
